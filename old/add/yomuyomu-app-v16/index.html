<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2e7d32">
  <meta name="description" content="修行が数字で証明されるアプリ。毎日のお題目・勤行を記録し、あなたの『成功パターン』を発見。">
  
  <title>よむよむお題目 - 修行が変わる</title>
  
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icons/icon-192x192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <!-- ルートコンテナ -->
  <div id="app"></div>
  
  <!-- チュートリアル -->
  <div id="tutorial-container"></div>
  
  <!-- 修行後プロンプト -->
  <div id="post-practice-prompt-container"></div>
  
  <!-- ダッシュボード -->
  <div id="dashboard-container"></div>
  
  <!-- デバッグモード -->
  <div id="debug-panel-container" style="display: none;"></div>
  
  <!-- Service Worker登録 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(reg => console.log('✅ Service Worker registered'))
        .catch(err => console.log('❌ Service Worker failed:', err));
    }
  </script>
  
  <!-- スクリプト読み込み順序が重要 -->
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/abilities.js"></script>
  <script src="/js/storage.js"></script>
  <script src="/js/schedule-config.js"></script>
  <script src="/js/practice.js"></script>
  <script src="/js/reflection.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/charts.js"></script>
  <script src="/js/dev-tools.js"></script>
  <script src="/js/app.js"></script>
  
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
</body>
</html>
